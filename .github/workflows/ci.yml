name: Frontend CI — Build & Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB: Frontend build & lint (catches TypeScript + ESLint errors)
  # ─────────────────────────────────────────────────────────────────────────
  frontend-checks:
    name: Frontend Checks (Next.js build + ESLint)
    runs-on: ubuntu-latest

    env:
      # The build needs a backend URL env var — point to a dummy for CI
      NEXT_PUBLIC_API_URL: http://localhost:5000/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true   # report but don't fail until types are fully clean

      - name: ESLint check
        run: npm run lint

      - name: Build (catches compile + bundling errors)
        run: npm run build
        env:
          # Skip ESLint during build (already ran above)
          NEXT_TELEMETRY_DISABLED: 1
